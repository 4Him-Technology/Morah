<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid, space-1 → space-16" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--gradient-brand);border-radius:4px;width:22px}
  .t{font-size:10px;font-family:var(--font-mono);color:var(--text-faint)}
  .px{font-size:var(--text-2xs);font-weight:700;color:var(--text-body)}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><span class="px">4</span><span class="t">space-1</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span class="px">8</span><span class="t">space-2</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="px">12</span><span class="t">space-3</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="px">16</span><span class="t">space-4</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="px">24</span><span class="t">space-6</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="px">32</span><span class="t">space-8</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="px">48</span><span class="t">space-12</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="px">64</span><span class="t">space-16</span></div>
</div>
</body></html>
