<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — plum-tinted grays" subtitle="Text, borders, surfaces" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .ramp{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:74px;border-radius:var(--radius-sm);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06)}
  .n{font-size:var(--text-2xs);font-weight:700;color:var(--text-body)}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--text-faint)}
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:var(--gray-0)"></div><span class="n">0</span><span class="h">#FFFFFF</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><span class="n">50</span><span class="h">#F8F6FA</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><span class="n">100</span><span class="h">#F0EEF4</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><span class="n">200</span><span class="h">#E2DFE9</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><span class="n">300</span><span class="h">#CCC8D6</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><span class="n">400</span><span class="h">#A7A1B5</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><span class="n">500</span><span class="h">#7C7689</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-600)"></div><span class="n">600</span><span class="h">#5B5667</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><span class="n">700</span><span class="h">#433F4D</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-800)"></div><span class="n">800</span><span class="h">#2B2833</span></div>
  <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><span class="n">900</span><span class="h">#1A1720</span></div>
</div>
</body></html>
