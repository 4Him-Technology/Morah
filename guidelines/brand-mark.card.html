<!-- @dsCard group="Brand" viewport="700x210" name="Logo mark — the circuit amora" subtitle="Blackberry outline with circuit-node core; ink #4B244D" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { display: flex; align-items: flex-end; justify-content: center; gap: 44px; height: 210px; padding-bottom: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { display: block; height: auto; }
  .sz { font-size: var(--text-2xs); font-weight: 700; color: var(--text-faint); letter-spacing: var(--tracking-wide); }
  .chip { display: flex; align-items: center; justify-content: center; padding: 16px 20px; border-radius: var(--radius-md); background: var(--berry-950); }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><img src="../assets/morah-mark.png" width="22"><span class="sz">22px</span></div>
  <div class="item"><img src="../assets/morah-mark.png" width="40"><span class="sz">40px</span></div>
  <div class="item"><img src="../assets/morah-mark.png" width="70"><span class="sz">70px</span></div>
  <div class="item"><img src="../assets/morah-mark.png" width="104"><span class="sz">104px</span></div>
  <div class="item"><div class="chip"><img src="../assets/morah-mark-white.png" width="64"></div><span class="sz">on plum</span></div>
</div>
</body>
</html>
