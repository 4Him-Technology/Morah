<!-- @dsCard group="Colors" viewport="700x180" name="Accent — Leaf green" subtitle="The calyx green; confirmations & positive states" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .ramp{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:74px;border-radius:var(--radius-sm);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04)}
  .n{font-size:var(--text-2xs);font-weight:700;color:var(--text-body)}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--text-faint)}
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:var(--leaf-50)"></div><span class="n">50</span><span class="h">#ECF7EF</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-100)"></div><span class="n">100</span><span class="h">#D2EDD9</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-200)"></div><span class="n">200</span><span class="h">#A9DCB8</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-300)"></div><span class="n">300</span><span class="h">#7BC795</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-400)"></div><span class="n">400</span><span class="h">#4FAE6F</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-500)"></div><span class="n">500 ★</span><span class="h">#3E9B63</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-600)"></div><span class="n">600</span><span class="h">#2F7D4E</span></div>
  <div class="sw"><div class="chip" style="background:var(--leaf-700)"></div><span class="n">700</span><span class="h">#245F3C</span></div>
</div>
</body></html>
