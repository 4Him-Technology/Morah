<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--bg-app); font-family: var(--font-body); }
  .wrap { display: flex; height: 300px; }
  .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .light { background: #F7F7EA; }
  .dark { background: var(--gradient-sidebar); }
  .panel img.full { width: 190px; height: auto; }
  .tag { font-size: var(--text-2xs); font-weight: 700; letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .tag.on-light { color: var(--text-faint); }
  .tag.on-dark { color: var(--text-on-dark-faint); }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel light">
    <img class="full" src="../assets/morah-logo-full.png" alt="Morah">
    <div class="tag on-light">Segurança do Trabalho · NR1</div>
  </div>
  <div class="panel dark">
    <img class="full" src="../assets/morah-logo-full-white.png" alt="Morah">
    <div class="tag on-dark">Segurança do Trabalho · NR1</div>
  </div>
</div>
</body>
</html>
