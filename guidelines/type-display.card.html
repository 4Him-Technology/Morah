<!-- @dsCard group="Type" viewport="700x230" name="Display — Plus Jakarta Sans" subtitle="Headings, KPIs, the wordmark" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--surface-card)}
  .meta{font-family:var(--font-body);font-size:var(--text-2xs);font-weight:700;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-faint);margin-bottom:14px}
  .d1{font-family:var(--font-display);font-weight:800;font-size:40px;letter-spacing:-0.03em;color:var(--text-strong);line-height:1.05}
  .d2{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-0.02em;color:var(--text-strong);margin-top:12px}
  .row{display:flex;gap:24px;margin-top:16px;font-family:var(--font-display)}
  .w{display:flex;flex-direction:column;gap:2px}
  .w b{font-size:22px;color:var(--berry-700)}
  .w span{font-size:var(--text-2xs);color:var(--text-faint);font-family:var(--font-body);font-weight:600}
</style></head>
<body>
<div class="meta">Plus Jakarta Sans · 400–800</div>
<div class="d1">Painel Administrativo</div>
<div class="d2">Visão geral dos dados psicossociais</div>
<div class="row">
  <div class="w"><b style="font-weight:400">Aa</b><span>Regular 400</span></div>
  <div class="w"><b style="font-weight:600">Aa</b><span>Semibold 600</span></div>
  <div class="w"><b style="font-weight:700">Aa</b><span>Bold 700</span></div>
  <div class="w"><b style="font-weight:800">Aa</b><span>Extrabold 800</span></div>
</div>
</body></html>
