<!-- @dsCard group="Colors" viewport="700x180" name="Brand — Blackberry ramp" subtitle="--berry-50 → --berry-950, primary at 500" -->
<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .ramp{display:flex;gap:8px}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px}
  .chip{height:74px;border-radius:var(--radius-sm);box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04)}
  .n{font-size:var(--text-2xs);font-weight:700;color:var(--text-body)}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--text-faint)}
  .star{font-size:9px;font-weight:700;color:var(--berry-500);letter-spacing:.04em}
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:var(--berry-50)"></div><span class="n">50</span><span class="h">#FBF4FB</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-100)"></div><span class="n">100</span><span class="h">#F4E4F3</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-200)"></div><span class="n">200</span><span class="h">#E8C8E7</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-300)"></div><span class="n">300</span><span class="h">#D49FD2</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-400)"></div><span class="n">400</span><span class="h">#BD6FBA</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-500)"></div><span class="n">500 ★</span><span class="h">#A4459C</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-600)"></div><span class="n">600</span><span class="h">#8A2F82</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-700)"></div><span class="n">700</span><span class="h">#6F2568</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-800)"></div><span class="n">800</span><span class="h">#511E4C</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-900)"></div><span class="n">900</span><span class="h">#341432</span></div>
  <div class="sw"><div class="chip" style="background:var(--berry-950)"></div><span class="n">950</span><span class="h">#1F0B20</span></div>
</div>
</body></html>
